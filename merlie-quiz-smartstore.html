<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>나에게 딱 맞는 강아지 유모차는? | MERLIE</title>
<style>
@font-face {
  font-family: 'SUIT';
  src: url('https://cdn.jsdelivr.net/gh/sunn-us/SUIT@2/fonts/variable/woff2/SUIT-Variable.woff2') format('woff2-variations');
  font-weight: 100 900;
  font-display: swap;
}
:root{
  --bg:#F2F4F6;
  --card:#FFFFFF;
  --blue:#3182F6;
  --blue-deep:#1B64DA;
  --blue-tint:#E8F3FF;
  --ink:#191F28;
  --ink-sub:#4E5968;
  --ink-faint:#8B95A1;
  --line:#E5E8EB;
  --radius:20px;
  --shadow: 0 8px 24px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'SUIT', -apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg);
  color:var(--ink);
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  padding:0;
  word-break:keep-all;
  overflow-wrap:break-word;
}
#app{
  width:100%;
  max-width:480px;
  min-height:100vh;
  min-height:100dvh;
  background:var(--card);
  position:relative;
  display:flex;
  flex-direction:column;
  box-shadow:var(--shadow);
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* progress */
.progress-wrap{
  padding:16px 24px 0;
  display:flex;
  align-items:center;
  gap:12px;
}
.progress-track{
  flex:1;
  height:4px;
  background:var(--line);
  border-radius:99px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:var(--blue);
  border-radius:99px;
  width:0%;
  transition:width .45s cubic-bezier(.2,.8,.2,1);
}
.progress-label{
  font-size:13px;
  font-weight:600;
  color:var(--ink-faint);
  min-width:40px;
  text-align:right;
}
.back-btn{
  width:32px;height:32px;
  border:none;background:transparent;
  color:var(--ink-sub);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  border-radius:10px;
  flex:none;
}
.back-btn:hover{background:var(--bg);}
.back-btn svg{width:20px;height:20px;}

/* screens */
.screen{
  flex:1;
  display:none;
  flex-direction:column;
  padding:28px 24px 32px;
  animation:fadeSlide .38s cubic-bezier(.2,.8,.2,1);
}
.screen.active{display:flex;}
@keyframes fadeSlide{
  from{opacity:0; transform:translateY(10px);}
  to{opacity:1; transform:translateY(0);}
}

/* intro */
#screen-intro{padding-top:0;}
.intro-hero{
  margin-top:40px;
  border-radius:24px;
  background:linear-gradient(155deg,#EAF2FF 0%, #F7FAFF 60%, #FFFFFF 100%);
  padding:36px 28px 32px;
  position:relative;
  overflow:hidden;
}
.intro-eyebrow{
  font-size:13px;
  font-weight:700;
  color:var(--blue-deep);
  background:var(--blue-tint);
  display:inline-block;
  padding:6px 12px;
  border-radius:99px;
  letter-spacing:.2px;
}
.intro-title{
  margin:18px 0 10px;
  font-size:28px;
  font-weight:800;
  line-height:1.35;
  letter-spacing:-.5px;
}
.intro-title em{color:var(--blue); font-style:normal;}
.intro-sub{
  font-size:15px;
  color:var(--ink-sub);
  line-height:1.6;
  margin:0;
}
.intro-illust{
  margin-top:24px;
  display:flex;
  gap:8px;
}
.feature-chip{
  font-size:12.5px;
  font-weight:600;
  color:var(--ink-sub);
  background:#fff;
  padding:8px 12px;
  border-radius:10px;
  box-shadow:0 4px 12px rgba(15,23,42,.05);
}
.intro-meta{
  margin-top:24px;
  font-size:13px;
  color:var(--ink-faint);
  display:flex;
  align-items:center;
  gap:6px;
}
.intro-foot{margin-top:36px;}
.cta-btn{
  width:100%;
  border:none;
  background:var(--blue);
  color:#fff;
  font-family:inherit;
  font-size:17px;
  font-weight:700;
  padding:17px 0;
  border-radius:16px;
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
  display:flex;align-items:center;justify-content:center;gap:6px;
}
.cta-btn:active{transform:scale(.98); background:var(--blue-deep);}
.cta-btn.ghost{
  background:var(--bg);
  color:var(--ink);
}
.cta-btn.ghost:active{background:var(--line);}

/* question */
.q-eyebrow{
  font-size:13px;
  font-weight:700;
  color:var(--blue);
}
.q-title{
  font-size:23px;
  font-weight:800;
  line-height:1.42;
  letter-spacing:-.3px;
  margin:10px 0 28px;
  white-space:pre-line;
}
.options{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.option{
  border:1.5px solid var(--line);
  background:#fff;
  border-radius:16px;
  padding:18px 18px;
  font-family:inherit;
  font-size:15.5px;
  font-weight:600;
  color:var(--ink);
  text-align:left;
  line-height:1.5;
  cursor:pointer;
  transition:border-color .15s ease, background .15s ease, transform .1s ease;
  white-space:pre-line;
}
.option:active{transform:scale(.985);}
.option:hover{border-color:#BFD9FF; background:var(--blue-tint);}
.option.selected{
  border-color:var(--blue);
  background:var(--blue-tint);
  color:var(--blue-deep);
}
.q-footer{margin-top:auto; padding-top:24px;}

#screen-transition{justify-content:center;}
.transition-body{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:14px;
}
.transition-footer{
  width:100%;
  margin-top:40px;
}
.transition-mark{
  width:36px;height:3px;
  border-radius:99px;
  background:var(--blue);
}
.transition-title{font-size:21px; font-weight:800; line-height:1.5; white-space:pre-line;}
.transition-sub{font-size:14.5px; color:var(--ink-sub); line-height:1.6; white-space:pre-line;}

/* loading */
#screen-loading{align-items:center; justify-content:center; text-align:center; gap:20px;}
.spinner{
  width:52px;height:52px;
  border-radius:50%;
  border:4px solid var(--blue-tint);
  border-top-color:var(--blue);
  animation:spin .85s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:16px; font-weight:700; color:var(--ink-sub);}

/* result */
#screen-result{padding-top:24px;}
.result-badge{
  font-size:13px;
  font-weight:700;
  color:var(--blue-deep);
  background:var(--blue-tint);
  display:inline-block;
  padding:6px 12px;
  border-radius:99px;
}
.result-name{
  font-size:30px;
  font-weight:800;
  letter-spacing:-.5px;
  margin:14px 0 4px;
}
.result-tagline{
  font-size:15px;
  color:var(--ink-sub);
  margin:0 0 20px;
}
.result-visual{
  border-radius:22px;
  background:linear-gradient(155deg,#EAF2FF, #FFFFFF);
  width:100%;
  aspect-ratio:1 / 1;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
  border:1px solid var(--line);
  overflow:hidden;
  position:relative;
}
.result-visual img{
  width:100%;
  height:100%;
  object-fit:contain;
}
.result-visual-code{
  font-size:34px;
  font-weight:800;
  letter-spacing:1px;
  color:var(--blue-deep);
}
.result-tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:22px;
}
.result-tag{
  font-size:13px;
  font-weight:600;
  color:var(--ink-sub);
  background:var(--bg);
  padding:8px 12px;
  border-radius:10px;
}
.result-card{
  border:1px solid var(--line);
  border-radius:18px;
  padding:20px;
  margin-bottom:16px;
}
.result-card-title{
  font-size:14px;
  font-weight:700;
  color:var(--ink-faint);
  margin:0 0 8px;
}
.result-card-body{
  font-size:15px;
  color:var(--ink);
  line-height:1.65;
  margin:0;
}
.result-footer{margin-top:20px; display:flex; flex-direction:column; gap:10px;}
.alt-section{margin-bottom:4px;}
.alt-title{
  font-size:14px;
  font-weight:700;
  color:var(--ink-faint);
  margin:0 0 10px;
}
.alt-list{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding-bottom:2px;
  -webkit-overflow-scrolling:touch;
}
.alt-card{
  flex:none;
  width:132px;
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
  text-align:left;
  background:#fff;
  cursor:pointer;
  font-family:inherit;
}
.alt-card:active{background:var(--bg);}
.alt-card-img{
  width:100%;
  height:88px;
  border-radius:10px;
  background:var(--bg);
  overflow:hidden;
  margin-bottom:8px;
}
.alt-card-img img{width:100%;height:100%;object-fit:cover;display:block;}
.alt-card-name{font-size:13.5px; font-weight:700; color:var(--ink); margin:0;}
.alt-card-tag{font-size:12px; color:var(--ink-faint); margin:2px 0 0;}
.share-row{display:flex; gap:8px; margin-top:12px;}
.icon-btn{
  flex:1;
  border:1.5px solid var(--line);
  background:#fff;
  border-radius:14px;
  padding:13px 0;
  font-family:inherit;
  font-weight:700;
  font-size:14px;
  color:var(--ink-sub);
  cursor:pointer;
}
.icon-btn:active{background:var(--bg);}
.disclaimer{
  margin-top:22px;
  font-size:12px;
  color:var(--ink-faint);
  line-height:1.6;
  text-align:center;
}
</style>
</head>
<body>
<div id="app">

  <div class="progress-wrap" id="progressWrap" style="display:none;">
    <button class="back-btn" id="backBtn" aria-label="이전으로">
      <svg viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0/7</div>
  </div>

  <!-- INTRO -->
  <div class="screen active" id="screen-intro">
    <div>
      <div class="intro-hero">
        <span class="intro-eyebrow">MERLIE PICK</span>
        <h1 class="intro-title">나에게 꼭 맞는<br><em>강아지 유모차</em> 찾기</h1>
        <p class="intro-sub">7개의 질문으로 우리 아이 몸무게, 이동 습관, 취향을 살펴보고<br>가장 잘 맞는 멀리 모델을 추천해드려요.</p>
        <div class="intro-illust">
          <span class="feature-chip">몸무게</span>
          <span class="feature-chip">이동 방식</span>
          <span class="feature-chip">사용 공간</span>
          <span class="feature-chip">취향</span>
        </div>
      </div>
      <div class="intro-meta">약 40초 소요 · 지금까지 <span id="introCount">1,204</span>명 참여</div>
    </div>
    <div class="intro-foot">
      <button class="cta-btn" id="startBtn">테스트 시작하기 →</button>
    </div>
  </div>

  <!-- QUESTIONS render dynamically -->
  <div class="screen" id="screen-question">
    <div class="q-eyebrow" id="qEyebrow">Q1</div>
    <h2 class="q-title" id="qTitle"></h2>
    <div class="options" id="qOptions"></div>
  </div>

  <!-- TRANSITION -->
  <div class="screen" id="screen-transition">
    <div class="transition-body">
      <div class="transition-mark"></div>
      <div class="transition-title" id="transTitle"></div>
      <div class="transition-sub" id="transSub"></div>
    </div>
    <div class="transition-footer">
      <button class="cta-btn" id="transNextBtn">계속할게요</button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="screen" id="screen-loading">
    <div class="spinner"></div>
    <div class="loading-text">딱 맞는 유모차를 고르는 중이에요…</div>
  </div>

  <!-- RESULT -->
  <div class="screen" id="screen-result">
    <span class="result-badge">보호자님을 위한 추천</span>
    <h2 class="result-name" id="resultName"></h2>
    <p class="result-tagline" id="resultTagline"></p>
    <div class="result-visual">
      <img id="resultImage" alt="" style="display:none;">
      <span class="result-visual-code" id="resultVisualCode"></span>
    </div>
    <div class="result-tags" id="resultTags"></div>
    <div class="result-card">
      <p class="result-card-title">이런 점이 잘 맞아요</p>
      <p class="result-card-body" id="resultBody"></p>
    </div>
    <div class="alt-section" id="altSection" style="display:none;">
      <p class="alt-title">함께 비교해볼 만한 모델</p>
      <div class="alt-list" id="altList"></div>
    </div>
    <div class="result-footer">
      <button class="cta-btn" id="resultCtaBtn">MW 라인업 보러가기</button>
      <button class="cta-btn ghost" id="restartBtn">테스트 다시하기</button>
      <div class="share-row">
        <button class="icon-btn" id="copyLinkBtn">링크 복사</button>
        <button class="icon-btn" id="kakaoBtn">공유하기</button>
      </div>
    </div>
    <p class="disclaimer">본 결과는 응답 내용을 바탕으로 한 참고용 추천이며,<br>실제 구매 전 정확한 사이즈와 사양은 제품 상세페이지에서 확인해주세요.</p>
  </div>

</div>

<script>
/* ---------------------------------------------------
   데이터: smore 퀴즈 로직을 그대로 이식
   각 answer.candidates 에 포함된 모델은 +1점
--------------------------------------------------- */
const QUESTIONS = [
  {
    key: "count",
    eyebrow: "Q1",
    title: "현재 함께하고 있는\n강아지는 몇 마리인가요?",
    options: [
      { label: "1마리와 함께 하고 있어요", candidates: ["MW2 베이지","MW2 블랙","MW3 베이지","MW3 블랙","MW4 팬텀블랙","MW4 샴페인골드","MW5 팬텀블랙","MW5 샴페인골드","MW8 블랙","MWX air"] },
      { label: "2마리와 함께 하고 있어요", candidates: ["MW3 베이지","MW3 블랙","MW5 팬텀블랙","MW5 샴페인골드","MW6 베이지","MW6 카키","MW8 블랙","MWX air"] },
      { label: "3마리 이상 함께 하고 있어요", candidates: ["MW6 베이지","MW6 카키"] }
    ]
  },
  {
    key: "weight",
    eyebrow: "Q2",
    title: "우리 강아지\n몸무게는 어느 정도인가요?",
    options: [
      { label: "6kg 미만", candidates: ["MW2 베이지","MW2 블랙","MW4 샴페인골드","MW4 팬텀블랙","MWX air"] },
      { label: "7~15kg", candidates: ["MW5 팬텀블랙","MW5 샴페인골드","MW3 베이지","MW3 블랙","MWX air"] },
      { label: "16~30kg", candidates: ["MW6 베이지","MW6 카키","MW8 블랙"] },
      { label: "31kg 이상", candidates: ["MW8 블랙"] }
    ]
  },
  {
    key: "color",
    eyebrow: "Q3",
    title: "보호자님은 어떤 색깔의\n유모차가 마음에 드세요?",
    options: [
      { label: "관리가 편한 '어두운 컬러'가 더 끌려요", candidates: ["MW2 블랙","MW3 블랙","MWX air","MW4 팬텀블랙","MW5 팬텀블랙","MW6 카키","MW8 블랙"] },
      { label: "산책할 때 기분 좋아지는 '밝은 컬러'가 더 끌려요", candidates: ["MW5 샴페인골드","MW3 베이지","MW2 베이지","MW4 샴페인골드","MW6 베이지"] }
    ]
  },
  {
    key: "transport",
    eyebrow: "Q4",
    title: "강아지와 외출할 때\n주로 이용하는 교통수단은?",
    options: [
      { label: "주로 '도보'로 이동해요", candidates: ["MW2 베이지","MW3 블랙","MW2 블랙","MW3 베이지","MW6 베이지","MW6 카키","MWX air","MW8 블랙"] },
      { label: "주로 '자가용'을 이용해요", candidates: ["MWX air","MW6 카키","MW8 블랙","MW4 샴페인골드","MW5 샴페인골드","MW5 팬텀블랙","MW4 팬텀블랙","MW6 베이지"] },
      { label: "주로 '대중교통'을 이용해요", candidates: ["MW2 베이지","MW2 블랙"] }
    ]
  },
  {
    key: "structure",
    eyebrow: "Q5",
    title: "강아지 유모차를 고를 때\n둘 중 더 끌리는 구조는?",
    options: [
      { label: "케이지와 프레임이 함께 접히는 '일체형'", candidates: ["MW2 베이지","MW3 블랙","MW2 블랙","MW3 베이지","MW6 베이지","MW6 카키","MW8 블랙"] },
      { label: "케이지와 프레임이 분리되는 '분리형'", candidates: ["MWX air","MW5 팬텀블랙","MW5 샴페인골드","MW4 샴페인골드","MW4 팬텀블랙"] }
    ]
  },
  {
    key: "place",
    eyebrow: "Q6",
    title: "강아지 유모차를 구매하신다면\n주로 어디에서 사용하실까요?",
    options: [
      { label: "백화점, 쇼핑몰, 마트 등 실내 공간", candidates: ["MW3 블랙","MW5 샴페인골드","MW5 팬텀블랙","MWX air","MW3 베이지","MW2 베이지","MW2 블랙","MW6 베이지","MW6 카키","MW8 블랙","MW4 팬텀블랙","MW4 샴페인골드"] },
      { label: "집앞, 공원 등 산책 공간", candidates: ["MW2 베이지","MW2 블랙","MW4 팬텀블랙","MW4 샴페인골드","MW3 베이지","MW3 블랙","MW5 팬텀블랙","MW5 샴페인골드","MWX air","MW8 블랙","MW6 베이지","MW6 카키"] },
      { label: "캠핑, 여행 등 특수 공간", candidates: ["MW6 베이지","MW6 카키","MW3 베이지","MW3 블랙"] }
    ]
  },
  {
    key: "priority",
    eyebrow: "Q7",
    title: "강아지 유모차를 고를 때\n가장 중요하게 보는 점은?",
    options: [

/* ---------------------------------------------------
   상태 & 렌더링
--------------------------------------------------- */
let currentQIndex = 0;
let scores = {};
let history = []; // navigation stack: 'intro' | {type:'q', index} | {type:'trans', afterIndex}

const screens = {
  intro: document.getElementById('screen-intro'),
  question: document.getElementById('screen-question'),
  transition: document.getElementById('screen-transition'),
  loading: document.getElementById('screen-loading'),
  result: document.getElementById('screen-result'),
};
const progressWrap = document.getElementById('progressWrap');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');

function showScreen(name){
  Object.values(screens).forEach(s => s.classList.remove('active'));
  screens[name].classList.add('active');
  progressWrap.style.display = (name === 'question' || name === 'transition') ? 'flex' : 'none';
}

function updateProgress(){
  const pct = Math.round((currentQIndex / QUESTIONS.length) * 100);
  progressFill.style.width = pct + '%';
  progressLabel.textContent = `${currentQIndex}/${QUESTIONS.length}`;
}

function renderQuestion(){
  const q = QUESTIONS[currentQIndex];
  document.getElementById('qEyebrow').textContent = q.eyebrow;
  document.getElementById('qTitle').textContent = q.title;
  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = opt.label;
    btn.onclick = () => selectOption(q, opt);
    optsEl.appendChild(btn);
  });
  updateProgress();
  showScreen('question');
}

function selectOption(q, opt){
  opt.candidates.forEach(model => {
    scores[model] = (scores[model] || 0) + 1;
  });
  history.push({type:'q', index: currentQIndex});
  currentQIndex++;

  const trans = TRANSITIONS[currentQIndex];
  if (trans){
    renderTransition(trans);
  } else if (currentQIndex < QUESTIONS.length){
    renderQuestion();
  } else {
    runResult();
  }
}

function renderTransition(trans){
  document.getElementById('transTitle').textContent = trans.title;
  document.getElementById('transSub').textContent = trans.sub;
  updateProgress();
  showScreen('transition');
}

document.getElementById('transNextBtn').onclick = () => {
  if (currentQIndex < QUESTIONS.length){
    renderQuestion();
  } else {
    runResult();
  }
};

document.getElementById('backBtn').onclick = () => {
  if (history.length === 0){
    resetQuiz();
    return;
  }
  const last = history.pop();
  if (last.type === 'q'){
    // undo score from that question's selection is skipped for simplicity;
    // recompute scores by clearing and note: for a clean UX we just step index back
    currentQIndex = last.index;
    renderQuestion();
  }
};

function runResult(){
  showScreen('loading');
  setTimeout(() => {
    let bestScore = -1, ties = [];
    Object.entries(scores).forEach(([model, s]) => {
      if (s > bestScore){ bestScore = s; ties = [model]; }
      else if (s === bestScore){ ties.push(model); }
    });
    const best = ties[Math.floor(Math.random() * ties.length)] || "MW3 블랙";
    const alternates = Object.entries(scores)
      .filter(([model]) => model !== best)
      .sort((a,b) => b[1] - a[1])
      .slice(0, 2)
      .map(([model]) => model);
    renderResult(best, alternates);
  }, 1100);
}

function renderResult(modelKey, alternates){
  alternates = alternates || [];
  const info = RESULT_INFO[modelKey] || RESULT_INFO["MW3 블랙"];
  const product = PRODUCT_LINKS[modelKey];

  document.getElementById('resultName').textContent = modelKey;
  document.getElementById('resultTagline').textContent = info.tagline;
  document.getElementById('resultBody').textContent = info.body;

  const img = document.getElementById('resultImage');
  const code = document.getElementById('resultVisualCode');
  if (product && product.image){
    img.src = product.image;
    img.style.display = 'block';
    code.style.display = 'none';
    img.onerror = () => { img.style.display = 'none'; code.style.display = 'block'; };
  } else {
    img.style.display = 'none';
    code.style.display = 'block';
    code.textContent = modelKey.split(' ')[0];
  }

  const tagsEl = document.getElementById('resultTags');
  tagsEl.innerHTML = '';
  info.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'result-tag';
    span.textContent = t;
    tagsEl.appendChild(span);
  });

  const ctaBtn = document.getElementById('resultCtaBtn');
  const productUrl = (product && product.link) || 'https://www.merlie.co.kr';
  ctaBtn.textContent = `${modelKey} 담아보기`;
  ctaBtn.onclick = () => window.open(productUrl, '_blank');

  const altSection = document.getElementById('altSection');
  const altList = document.getElementById('altList');
  altList.innerHTML = '';
  if (alternates.length > 0){
    altSection.style.display = 'block';
    alternates.forEach(altKey => {
      const altInfo = RESULT_INFO[altKey];
      const altProduct = PRODUCT_LINKS[altKey];
      if (!altInfo || !altProduct) return;
      const card = document.createElement('button');
      card.className = 'alt-card';
      card.innerHTML = `
        <div class="alt-card-img"><img src="${altProduct.image}" alt=""></div>
        <p class="alt-card-name">${altKey}</p>
        <p class="alt-card-tag">${altInfo.tags[0] || ''}</p>
      `;
      card.onclick = () => window.open(altProduct.link, '_blank');
      altList.appendChild(card);
    });
  } else {
    altSection.style.display = 'none';
  }

  showScreen('result');
}

document.getElementById('startBtn').onclick = () => {
  currentQIndex = 0;
  scores = {};
  history = [];
  renderQuestion();
};

document.getElementById('restartBtn').onclick = resetQuiz;
function resetQuiz(){
  currentQIndex = 0;
  scores = {};
  history = [];
  showScreen('intro');
}

document.getElementById('copyLinkBtn').onclick = async () => {
  try{
    await navigator.clipboard.writeText(window.location.href);
    const btn = document.getElementById('copyLinkBtn');
    const original = btn.textContent;
    btn.textContent = '복사됐어요';
    setTimeout(() => btn.textContent = original, 1400);
  }catch(e){}
};

document.getElementById('kakaoBtn').onclick = () => {
  if (navigator.share){
    navigator.share({ title:'나에게 딱 맞는 강아지 유모차는?', url: window.location.href });
  } else {
    document.getElementById('copyLinkBtn').click();
  }
};
